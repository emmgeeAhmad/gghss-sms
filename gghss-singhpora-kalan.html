<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GGHSS Singhpora Kalan · School Management System</title>
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B3A5C;
    --navy-dark:#0F273D;
    --saffron:#D68A2C;
    --saffron-dark:#B06F1B;
    --cream:#F6F1E4;
    --paper:#FBF8F0;
    --ink:#2A2A26;
    --ink-soft:#5B564C;
    --green:#2D6A4F;
    --green-bg:#E4F0E9;
    --red:#9C3B3B;
    --red-bg:#F4E4E2;
    --line:#DCD2B8;
    --gold-line:#C79A4B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Fraunces','Lora',serif;}
  ::selection{background:var(--saffron);color:#fff;}

  /* ---------- Seal ---------- */
  .seal{width:64px;height:64px;flex-shrink:0;}
  .seal-sm{width:40px;height:40px;flex-shrink:0;}

  /* ---------- Login ---------- */
  .login-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(214,138,44,0.08), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(27,58,92,0.10), transparent 40%),
      var(--cream);
    padding:24px;
  }
  .login-card{
    background:var(--paper);
    border:1px solid var(--line);
    box-shadow:0 2px 0 var(--gold-line), 0 24px 60px -20px rgba(15,39,61,0.35);
    border-radius:6px;
    max-width:920px;width:100%;
    display:flex;overflow:hidden;
  }
  .login-left{
    background:var(--navy);
    color:#F4EEDD;
    flex:1.1;
    padding:44px 36px;
    display:flex;flex-direction:column;justify-content:space-between;
    position:relative;
  }
  .login-left::after{
    content:"";position:absolute;inset:10px;border:1px solid rgba(244,238,221,0.25);pointer-events:none;
  }
  .login-right{flex:1;padding:44px 40px;display:flex;flex-direction:column;justify-content:center;}
  @media(max-width:700px){
    .login-wrap{padding:12px;}
    .login-card{flex-direction:column;max-width:480px;}
    .login-left{padding:26px 22px;}
    .login-right{padding:26px 22px;}
  }
  @media(max-width:700px){
    .login-wrap{padding:14px;}
    .login-card{flex-direction:column;max-width:480px;}
    .login-left{padding:28px 24px;}
    .login-right{padding:28px 24px;}
  }
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--saffron);font-weight:600;}
  .login-left .eyebrow{color:#E3B26A;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.02em;}
  .field input,.field select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:4px;
    background:#fff;font-family:inherit;font-size:14px;color:var(--ink);
  }
  .field input:focus,.field select:focus{outline:2px solid var(--saffron);outline-offset:1px;border-color:var(--saffron);}
  .role-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .role-tab{
    flex:1;padding:10px 6px;text-align:center;border:1px solid var(--line);border-radius:4px;
    background:#fff;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--ink-soft);
  }
  .role-tab.active{background:var(--navy);border-color:var(--navy);color:#fff;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 18px;border-radius:4px;border:none;cursor:pointer;
    font-family:inherit;font-weight:600;font-size:13.5px;letter-spacing:.01em;
  }
  .btn-primary{background:var(--saffron);color:#fff;}
  .btn-primary:hover{background:var(--saffron-dark);}
  .btn-navy{background:var(--navy);color:#fff;}
  .btn-navy:hover{background:var(--navy-dark);}
  .btn-outline{background:transparent;border:1px solid var(--line);color:var(--ink);}
  .btn-outline:hover{border-color:var(--navy);}
  .btn-danger{background:var(--red-bg);color:var(--red);}
  .btn-danger:hover{background:#eccac6;}
  .btn-block{width:100%;}
  .err-box{background:var(--red-bg);color:var(--red);border:1px solid #E3B7B0;padding:9px 12px;border-radius:4px;font-size:13px;margin-bottom:14px;}
  .demo-box{margin-top:22px;font-size:12px;color:var(--ink-soft);background:var(--cream);border:1px dashed var(--line);border-radius:4px;padding:10px 12px;line-height:1.6;}
  .demo-box b{color:var(--ink);}

  /* ---------- App shell ---------- */
  .app{display:flex;min-height:100vh;}
  .sidebar{
    width:230px;flex-shrink:0;background:var(--navy);color:#EDE6D2;
    display:flex;flex-direction:column;padding:22px 14px;
  }
  .sb-brand{display:flex;gap:10px;align-items:center;padding:0 6px 18px;border-bottom:1px solid rgba(237,230,210,0.18);margin-bottom:16px;}
  .sb-brand .name{font-size:13.5px;font-weight:700;line-height:1.25;font-family:'Fraunces',serif;}
  .sb-brand .loc{font-size:10.5px;color:#C9BE9E;letter-spacing:.04em;text-transform:uppercase;margin-top:2px;}
  .sb-role{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#D68A2C;font-weight:700;padding:0 6px;margin-bottom:10px;}
  .sb-link{
    display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:4px;
    color:#EDE6D2;text-decoration:none;font-size:13.5px;font-weight:500;cursor:pointer;margin-bottom:2px;
  }
  .sb-link:hover{background:rgba(255,255,255,0.06);}
  .sb-link.active{background:var(--saffron);color:#fff;font-weight:700;}
  .sb-spacer{flex:1;}
  .sb-user{padding:10px;border-top:1px solid rgba(237,230,210,0.18);font-size:12px;}
  .sb-user .u-name{font-weight:700;font-size:13px;}
  .sb-user .u-role{color:#C9BE9E;font-size:11px;text-transform:uppercase;letter-spacing:.06em;}
  .sb-logout{margin-top:8px;width:100%;color:var(--cream)!important;border-color:rgba(244,238,221,0.5)!important;background:rgba(255,255,255,0.04);}
  .sb-logout:hover{background:rgba(255,255,255,0.12);}

  .main{flex:1;min-width:0;}
  .topbar{
    background:var(--paper);border-bottom:1px solid var(--line);
    padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:14px;
  }
  .topbar h1{font-size:19px;margin:0;font-weight:700;}
  .topbar .sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .content{padding:26px 28px 60px;max-width:1180px;}

  .hamburger{display:none;background:none;border:1px solid var(--line);border-radius:4px;padding:8px 10px;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0;}
  .sb-overlay{display:none;}

  @media(max-width:820px){
    .hamburger{display:inline-flex;align-items:center;justify-content:center;}
    .sidebar{
      position:fixed;top:0;bottom:0;left:0;width:250px;z-index:60;
      transform:translateX(-105%);transition:transform .22s ease;
      box-shadow:8px 0 30px rgba(0,0,0,0.25);overflow-y:auto;
    }
    .sidebar.open{transform:translateX(0);}
    .sb-overlay.open{
      display:block;position:fixed;inset:0;background:rgba(15,39,61,0.5);z-index:55;
    }
    .main{width:100%;}
    .topbar{padding:14px 16px;}
    .topbar h1{font-size:16.5px;}
    .content{padding:16px 14px 48px;}
    table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;}
  }

  /* ---------- Cards / stats ---------- */
  .grid{display:grid;gap:16px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:repeat(2,1fr);}
  @media(max-width:900px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr 1fr;}}
  @media(max-width:480px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}
  @media(max-width:700px){
    table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;}
  }
  .stat-card{
    background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:18px;
    border-top:3px solid var(--saffron);
  }
  .stat-card .num{font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--navy);}
  .stat-card .lbl{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:22px;margin-bottom:20px;}
  .panel h2{font-size:16px;margin:0 0 16px;padding-bottom:10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
  .panel h2 .tag{font-size:10.5px;background:var(--green-bg);color:var(--green);padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;}

  /* ---------- Table (ledger look) ---------- */
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  thead th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--ink-soft);border-bottom:2px solid var(--navy);padding:8px 10px;font-weight:700;
  }
  tbody td{padding:9px 10px;border-bottom:1px solid var(--line);}
  tbody tr:nth-child(even){background:rgba(214,138,44,0.04);}
  tbody tr:hover{background:rgba(27,58,92,0.05);}
  .idx{color:var(--ink-soft);font-variant-numeric:tabular-nums;width:34px;}

  .row-inline{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px;}
  .row-inline .field{margin-bottom:0;min-width:150px;}
  .pill{padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;letter-spacing:.02em;}
  .pill-present{background:var(--green-bg);color:var(--green);}
  .pill-absent{background:var(--red-bg);color:var(--red);}
  .toggle-att{border:1px solid var(--line);border-radius:20px;padding:4px 4px;display:inline-flex;gap:2px;background:#fff;}
  .toggle-att button{border:none;background:transparent;padding:4px 12px;border-radius:16px;font-size:11.5px;font-weight:700;cursor:pointer;}
  .toggle-att button.p-on{background:var(--green);color:#fff;}
  .toggle-att button.a-on{background:var(--red);color:#fff;}

  .empty{padding:36px 10px;text-align:center;color:var(--ink-soft);font-size:13.5px;}
  .empty b{display:block;color:var(--ink);font-size:14.5px;margin-bottom:4px;font-family:'Fraunces',serif;}

  /* ---------- modal / cert overlay ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(15,39,61,0.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:var(--paper);border-radius:6px;max-width:560px;width:100%;padding:26px;max-height:90vh;overflow:auto;}
  .modal h3{margin-top:0;}

  #certOverlay{position:fixed;inset:0;background:#fff;z-index:100;overflow:auto;display:none;}
  .cert-toolbar{background:var(--navy);padding:12px 24px;display:flex;justify-content:flex-end;gap:10px;}
  .cert-sheet{max-width:760px;margin:30px auto;padding:50px 56px;border:1px solid var(--line);position:relative;}
  .cert-border{position:absolute;inset:14px;border:2px solid var(--gold-line);pointer-events:none;}
  .cert-head{text-align:center;border-bottom:2px solid var(--navy);padding-bottom:14px;margin-bottom:26px;}
  .cert-head .sch{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--navy);margin-top:8px;}
  .cert-head .addr{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .cert-title{text-align:center;font-family:'Fraunces',serif;font-size:18px;letter-spacing:.06em;text-transform:uppercase;margin:18px 0 26px;text-decoration:underline;text-underline-offset:6px;}
  .cert-body{font-size:14.5px;line-height:2;text-align:justify;}
  .cert-foot{display:flex;justify-content:space-between;margin-top:60px;font-size:13px;}
  @media print{
    .no-print{display:none!important;}
    #certOverlay{position:static;}
    body *{visibility:hidden;}
    #certOverlay, #certOverlay *{visibility:visible;}
    #certOverlay{display:block!important;}
  }

  .link-btn{background:none;border:none;color:var(--navy);text-decoration:underline;cursor:pointer;font-size:13px;font-family:inherit;padding:0;}
  .link-btn.danger{color:var(--red);}
  textarea{font-family:inherit;}
  .note{font-size:12px;color:var(--ink-soft);margin-top:4px;}
</style>
</head>

<script>
/* ======================= DATA LAYER ======================= */
const SCHOOL_NAME = "Government Girls Higher Secondary School";

let DB = null;
let session = null; // {id, username, role, name, ...}

function saveSession(){
  try{
    if(session) localStorage.setItem('school_session', JSON.stringify(session));

function restoreSession(){

let route = "dashboard";

      {id:"s3", admissionNo:"GGHSS-2023-0003", name:"Mehak Farooq", fatherName:"Farooq Ahmad", motherName:"Yasmeena", dob:"2009-11-05", className:"10", section:"A", address:"Singhpora Kalan", contact:"9797000003", admissionDate:"2022-04-05", status:"active", username:"mehak.farooq", password:"Kalan6691#"}

async function loadDB(){
  try{
    const raw = localStorage.getItem('school_db');
    if(raw){ DB = JSON.parse(raw); }
    else { DB = seedDB(); await saveDB(); }
  }catch(e){
    DB = seedDB();
    await saveDB();
  }
  // Ensure older saved data (from before these features existed) has the new collections.
  if(!DB.reportCards) DB.reportCards = [];
  if(!DB.assignments) DB.assignments = [];
  if(!DB.circulars) DB.circulars = [];
  if(!DB.accountEntries) DB.accountEntries = [];
  if(!DB.approvals) DB.approvals = [];
}
async function saveDB(){
  try{ localStorage.setItem('school_db', JSON.stringify(DB)); }
  catch(e){ console.error('Save failed', e); }
}
function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }
function readFileAsDataURL(file){
  return new Promise((resolve, reject)=>{
    if(!file){ resolve(null); return; }
    if(file.size > 4*1024*1024){ reject(new Error('File is too large (max 4MB).')); return; }
    const reader = new FileReader();
    reader.onload = ()=> resolve({name:file.name, data:reader.result});
    reader.onerror = ()=> reject(reader.error);
    reader.readAsDataURL(file);
  });
}

/* ======================= HELPERS ======================= */
function studentsOf(cls, sec){
  return DB.students.filter(s => s.status!=='left' && s.className===cls && (!sec || s.section===sec));
}
function teacherStudents(u){
  const seen = new Set();
  const out = [];
  (u.assignments||[]).forEach(a=>{
    studentsOf(a.className, a.section).forEach(s=>{
      if(!seen.has(s.id)){ seen.add(s.id); out.push(s); }
    });
  });
  return out;
}
function teacherClassOptions(u){
  // unique {className, section} combos the teacher is assigned to
  const seen = new Set(); const out = [];
  (u.assignments||[]).forEach(a=>{
    const k = `${a.className}-${a.section}`;
    if(!seen.has(k)){ seen.add(k); out.push({className:a.className, section:a.section}); }
  });
  return out;
}
function teacherSubjectsFor(u, className, section){
  return (u.assignments||[]).filter(a=>a.className===className && a.section===section).map(a=>a.subject);
}
function hasOfficeAccess(s){
  return s.role==='principal' || s.role==='office' || (s.role==='teacher' && !!s.officeAccess);
}
function esc(str){ return (str||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function sealSVG(size){
  const s = size||64;
  return `<img src="${LOGO_DATA_URI}" alt="School logo" width="${s}" height="${s}" style="border-radius:50%;object-fit:contain;display:block;">`;
}

/* ======================= RENDER ROOT ======================= */
function render(){
  const app = document.getElementById('app');
  if(!session){ app.innerHTML = loginView(); attachLoginHandlers(); return; }
  app.innerHTML = shellView();
  attachShellHandlers();
}

/* ======================= LOGIN VIEW ======================= */
let loginRole = "principal";
let forgotOpen = false;
function loginView(){
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-left">
        <div>
          <div class="eyebrow">Jammu &amp; Kashmir · Government School</div>
          <div style="display:flex;gap:14px;align-items:center;margin-top:16px;">
            ${sealSVG(64)}
            <div>
              <div class="display" style="font-size:20px;font-weight:700;line-height:1.3;">${SCHOOL_NAME}</div>
              <div style="font-size:13px;color:#D8CEB0;margin-top:2px;">${SCHOOL_LOC}</div>
            </div>
          </div>
        </div>
        <div style="font-size:12.5px;line-height:1.8;color:#CFC5A6;margin-top:40px;">
          <div style="border-top:1px solid rgba(244,238,221,.25);padding-top:16px;">
            One platform for smarter school management.
          </div>
        </div>
      </div>
      <div class="login-right">
        <div class="eyebrow" style="color:var(--saffron-dark);">Sign in</div>
        <h1 style="margin:6px 0 20px;">School Management System</h1>
        ${flashError ? `<div class="err-box">${esc(flashError)}</div>` : ''}
        <div class="role-tabs">
          ${["principal","teacher","office","accounts","student"].map(r=>`
            <div class="role-tab ${r===loginRole?'active':''}" data-role="${r}">${r==='accounts' ? 'Accounts' : r[0].toUpperCase()+r.slice(1)}</div>
          `).join('')}
        </div>
        <form id="loginForm">
          <div class="field"><label>Username</label><input type="text" id="loginUser" autocomplete="username" required></div>
          <div class="field"><label>Password</label><input type="password" id="loginPass" autocomplete="current-password" required></div>
          <button type="submit" class="btn btn-primary btn-block">Log in</button>
        </form>
        <div style="margin-top:10px;"><button class="link-btn" id="forgotBtn" type="button">Forgot password?</button></div>
        ${forgotOpen ? `<div class="err-box" style="background:var(--cream);color:var(--ink-soft);border-color:var(--line);">
          Students and staff: ask your class teacher, the school office, or the Principal to reset your password
          for you from their panel. Principals: since this app stores data only in this browser, a password reset
          needs someone with direct access to the app's records — there's no email-based recovery here.
        </div>` : ''}
      </div>
    </div>
  </div>`;
}
function attachLoginHandlers(){
  document.querySelectorAll('.role-tab').forEach(t=>{
    t.onclick = ()=>{ loginRole = t.dataset.role; render(); };
  });
  const forgotBtn = document.getElementById('forgotBtn');
  if(forgotBtn) forgotBtn.onclick = ()=>{ forgotOpen = !forgotOpen; render(); };
  document.getElementById('loginForm').onsubmit = (e)=>{
    e.preventDefault();
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    if(loginRole==='student'){
      const foundStudent = DB.students.find(x=>x.status!=='left' && x.username===u && x.password===p);
      if(foundStudent){ session = {...foundStudent, role:'student'}; flashError=""; route="dashboard"; saveSession(); render(); }
      else{ flashError = "Incorrect username, password, or role selected."; render(); }
      return;
    }
    const found = DB.users.find(x=>x.username===u && x.password===p && x.role===loginRole);
    if(found){ session = found; flashError=""; route="dashboard"; saveSession(); render(); }
    else{ flashError = "Incorrect username, password, or role selected."; render(); }
  };
}

/* ======================= APP SHELL ======================= */
function navLinksFor(s){
  const role = s.role;
  if(role==='principal'){
    const pending = DB.approvals.filter(a=>a.status==='pending').length;
    return [
      ["dashboard","Dashboard"],["staff","Manage Staff"],["students","Students"],
      ["attendance","Attendance"],["marks","Marks"],["admissions","Admissions"],["certificates","Certificates"],
      ["reportcards","Report Cards"],["assignments","Assignments"],["circulars","Circulars"],["accounts","Accounts"],
      ["approvals", pending>0 ? `Approvals (${pending})` : "Approvals"],["backup","Backup & Restore"]
    ];
  }
  if(role==='teacher'){
    const links = [
      ["dashboard","Dashboard"],["attendance","Attendance"],["marks","Marks"],
      ["reportcards","Report Cards"],["assignments","Assignments"],["circulars","Circulars"]
    ];
    if(s.officeAccess){
      links.splice(3, 0, ["admissions","Admissions"], ["students","Student Directory"], ["certificates","Certificates"]);
    }
    return links;
  }
  if(role==='office') return [
    ["dashboard","Dashboard"],["admissions","Admissions"],["students","Student Directory"],["certificates","Certificates"],
    ["reportcards","Report Cards"],["circulars","Circulars"]
  ];
  if(role==='accounts') return [
    ["dashboard","Dashboard"],["staff","Manage Staff"],["accounts","Accounts"],["circulars","Circulars"]
  ];
  return [ // student
    ["dashboard","Dashboard"],["attendance","My Attendance"],["marks","My Marks"],["certificates","My Certificates"],
    ["reportcards","My Report Cards"],["assignments","Assignments"]
  ];
}

function attachShellHandlers(){
  document.querySelectorAll('.sb-link').forEach(l=> l.onclick=()=>{ route=l.dataset.route; mobileNavOpen=false; render(); });
  const hamburger = document.getElementById('hamburgerBtn');
  if(hamburger) hamburger.onclick = ()=>{ mobileNavOpen = !mobileNavOpen; render(); };
  const overlay = document.getElementById('sbOverlay');
  if(overlay) overlay.onclick = ()=>{ mobileNavOpen = false; render(); };
  document.getElementById('logoutBtn').onclick = ()=>{ session=null; route="dashboard"; mobileNavOpen=false; saveSession(); render(); };
  document.getElementById('changePwBtn').onclick = ()=>{ pwModalOpen=true; pwError=""; render(); };
  document.getElementById('editProfileBtn').onclick = ()=>{ profileModalOpen=true; profileError=""; render(); };
  const profCancel = document.getElementById('profCancel');
  if(profCancel) profCancel.onclick = ()=>{ profileModalOpen=false; profileError=""; render(); };
  const profSave = document.getElementById('profSave');
  if(profSave) profSave.onclick = async ()=>{
    const newName = document.getElementById('profName').value.trim();
    if(!newName){ profileError = "Name can't be empty."; render(); return; }
    const record = session.role==='student'
      ? DB.students.find(s=>s.id===session.id)
      : DB.users.find(u=>u.id===session.id);
    if(record){ record.name = newName; }
    session.name = newName;
    saveSession();
    await saveDB();
    profileModalOpen = false; profileError = "";
    render();
  };
  const cancel = document.getElementById('pwCancel');
  if(cancel) cancel.onclick = ()=>{ pwModalOpen=false; pwError=""; render(); };
  const save = document.getElementById('pwSave');
  if(save) save.onclick = async ()=>{
    const cur = document.getElementById('pwCurrent').value;
    const next = document.getElementById('pwNew').value;
    const confirmNext = document.getElementById('pwConfirm').value;
    if(cur !== session.password){ pwError = "Current password is incorrect."; render(); return; }
    if(!next || next.length < 6){ pwError = "New password must be at least 6 characters."; render(); return; }
    if(next !== confirmNext){ pwError = "New password and confirmation don't match."; render(); return; }
    const record = session.role==='student'
      ? DB.students.find(s=>s.id===session.id)
      : DB.users.find(u=>u.id===session.id);
    if(record){ record.password = next; }
    session.password = next;
    saveSession();
    await saveDB();
    pwModalOpen = false; pwError = "";
    render();
    alert('Password changed successfully.');
  };
  attachRouteHandlers();
}

  if(route==='certificates') return attachCertificatesHandlers();
  if(route==='reportcards') return attachReportCardsHandlers();
  if(route==='assignments') return attachAssignmentsHandlers();
  if(route==='circulars') return attachCircularsHandlers();

}

function dashboardView(){
  const totalStudents = DB.students.filter(s=>s.status!=='left').length;

    if(key.endsWith(today)){
      const recs = DB.attendance[key];
      attToday += Object.keys(recs).length;
      presentToday += Object.values(recs).filter(v=>v==='P').length;
    }
  });
  const pendingAdm = DB.admissions.filter(a=>a.status==='Pending').length;

  if(session.role==='principal'){
    return `

      <div class="stat-card"><div class="num">${totalStudents}</div><div class="lbl">Enrolled students</div></div>

      <div class="stat-card"><div class="num">${totalStaff}</div><div class="lbl">Total staff accounts</div></div>

        As Principal you can add or remove staff accounts, review and edit every student's record,
        view attendance and marks entered by any teacher, and oversee admissions and certificates
        issued by the office. Use the panel on the left to move between registers.
      </p>
      ${pendingAdm>0 ? `<p style="font-size:13.5px;"><b>${pendingAdm}</b> admission${pendingAdm>1?'s':''} awaiting review — see the Admissions register.</p>` : ''}
    </div>`;
  }
  if(session.role==='teacher'){
    const myStudents = teacherStudents(session);
    const classOpts = teacherClassOptions(session);
    const classList = classOpts.map(c=>`Class ${c.className}-${c.section}`).join(', ') || '—';
    return `
    <div class="grid grid-3" style="margin-bottom:22px;">
      <div class="stat-card"><div class="num">${myStudents.length}</div><div class="lbl">Students across your classes</div></div>
      <div class="stat-card"><div class="num">${classOpts.length}</div><div class="lbl">Classes assigned</div></div>
      <div class="stat-card"><div class="num">${presentToday}/${attToday||'—'}</div><div class="lbl">Marked present today (all classes)</div></div>
    </div>
    <div class="panel">
      <h2>Welcome, ${esc(session.name)} <span class="tag">${esc(session.designation||'Teacher')}</span></h2>
      <p style="line-height:1.8;color:var(--ink-soft);font-size:13.5px;">
        You teach <b>${classList}</b>.
        Use <b>Attendance</b> to mark today's roll call and <b>Marks</b> to record examination scores for the class you select.
        ${session.officeAccess ? ' You also have office access — use <b>Admissions</b>, <b>Student Directory</b>, and <b>Certificates</b> for office duties.' : ''}
      </p>
    </div>`;
  }
  if(session.role==='student'){
    const student = DB.students.find(s=>s.id===session.id) || session;
    const prefix = `${student.className}-${student.section}-`;
    let present=0, marked=0;
    Object.keys(DB.attendance).forEach(k=>{
      if(k.startsWith(prefix)){
        const v = DB.attendance[k][student.id];
        if(v){ marked++; if(v==='P') present++; }
      }
    });
    const attPct = marked ? Math.round(present/marked*100) : null;
    const myCerts = DB.certificates.filter(c=>c.studentId===student.id).length;
    return `
    <div class="grid grid-3" style="margin-bottom:22px;">

      </p>
    </div>`;
  }
  if(session.role==='accounts'){

    </div>
    <div class="panel">
      <h2>Welcome, ${esc(session.name)} <span class="tag">Accounts Officer</span></h2>
      <p style="line-height:1.8;color:var(--ink-soft);font-size:13.5px;">
        Use <b>Accounts</b> to record income and expenses, and <b>Manage Staff</b> to add, edit or reset staff logins.
      </p>
    </div>`;
  }
  // office

    <div class="stat-card"><div class="num">${totalStudents}</div><div class="lbl">Enrolled students</div></div>

    <h2>Welcome, ${esc(session.name)}</h2>
    <p style="line-height:1.8;color:var(--ink-soft);font-size:13.5px;">
      The office manages new admissions and issues certificates. Use <b>Admissions</b> to register a new student,
      and <b>Certificates</b> to prepare a Bonafide, Transfer, Character or Provisional Certificate for printing.
    </p>
  </div>`;
}

function attachStaffHandlers(){
  const addBtn = document.getElementById('addStaffBtn');
  if(addBtn) addBtn.onclick = ()=>{ staffFormOpen=true; staffEditId=null; sfAssignments=[{className:CLASSES[0], section:SECTIONS[0], subject:SUBJECTS[0]}]; render(); };
  document.querySelectorAll('[data-edit]').forEach(b=>{
    b.onclick = ()=>{
      const u = DB.users.find(x=>x.id===b.dataset.edit);
      if(!u) return;
      staffEditId = u.id;
      staffFormOpen = true;
      sfAssignments = (u.role==='teacher' && u.assignments && u.assignments.length)
        ? u.assignments.map(a=>({...a}))
        : [{className:CLASSES[0], section:SECTIONS[0], subject:SUBJECTS[0]}];
      render();
    };
  });
  document.querySelectorAll('[data-del]').forEach(b=>{
    b.onclick = async ()=>{
      if(!confirm('Remove this staff account?')) return;
      DB.users = DB.users.filter(u=>u.id!==b.dataset.del);
      await saveDB(); render();
    };
  });
  document.querySelectorAll('[data-reset]').forEach(b=>{
    b.onclick = async ()=>{
      const u = DB.users.find(x=>x.id===b.dataset.reset);
      if(!u) return;
      const newPass = prompt(`Enter a new password for ${u.name} (min 6 characters):`);
      if(newPass===null) return;
      if(newPass.length < 6){ alert('Password must be at least 6 characters.'); return; }
      if(session.role==='accounts'){
        DB.approvals.push({
          id:uid('ap'), kind:'staff_reset_password', targetId:u.id, targetLabel:u.name, changes:{password:newPass},
          requestedBy:session.name, requestedByRole:session.role, requestedDate:todayISO(), status:'pending'
        });
        await saveDB();
        alert('Password reset request submitted for Principal approval.');
      } else {
        u.password = newPass;
        await saveDB();
        alert(`Password for ${u.name} has been reset.`);
      }
    };
  });
  const roleSel = document.getElementById('sfRole');
  if(roleSel){
    const toggle = ()=> document.getElementById('sfTeacherFields').style.display = roleSel.value==='teacher' ? 'block':'none';
    roleSel.onchange = toggle; toggle();
  }
  document.querySelectorAll('[data-afield]').forEach(sel=>{
    sel.onchange = ()=>{
      const idx = parseInt(sel.dataset.arow, 10);
      sfAssignments[idx][sel.dataset.afield] = sel.value;
    };
  });
  const addRow = document.getElementById('sfAddRow');
  if(addRow) addRow.onclick = ()=>{ sfAssignments.push({className:CLASSES[0], section:SECTIONS[0], subject:SUBJECTS[0]}); render(); };
  document.querySelectorAll('[data-arow-remove]').forEach(b=>{
    b.onclick = ()=>{
      const idx = parseInt(b.dataset.arowRemove, 10);
      sfAssignments.splice(idx,1);
      render();
    };
  });
  const cancel = document.getElementById('sfCancel');
  if(cancel) cancel.onclick = ()=>{ staffFormOpen=false; staffEditId=null; render(); };
  const save = document.getElementById('sfSave');
  if(save) save.onclick = async ()=>{
    const name=document.getElementById('sfName').value.trim();
    const username=document.getElementById('sfUser').value.trim();
    const password=document.getElementById('sfPass').value;
    if(!name||!username){ alert('Please fill in name and username.'); return; }

    if(staffEditId){
      const u = DB.users.find(x=>x.id===staffEditId);
      if(!u){ staffFormOpen=false; render(); return; }
      if(DB.users.some(x=>x.id!==u.id && x.username===username)){ alert('That username is already taken.'); return; }

      if(session.role==='accounts'){
        const changes = {name, username};
        if(u.role==='teacher'){
          changes.designation = document.getElementById('sfDesignation').value;
          changes.assignments = sfAssignments.map(a=>({...a}));
        }
        DB.approvals.push({
          id:uid('ap'), kind:'staff_edit', targetId:u.id, targetLabel:u.name, changes,
          requestedBy:session.name, requestedByRole:session.role, requestedDate:todayISO(), status:'pending'
        });
        await saveDB();
        staffFormOpen=false; staffEditId=null; render();
        alert('Changes submitted for Principal approval.');
        return;
      }

      u.name = name;
      u.username = username;
      if(password){
        if(password.length < 6){ alert('New password must be at least 6 characters.'); return; }
        u.password = password;
      }
      if(u.role==='teacher'){
        u.designation = document.getElementById('sfDesignation').value;
        u.assignments = sfAssignments.map(a=>({...a}));
        u.officeAccess = document.getElementById('sfOfficeAccess').checked;
      }
      await saveDB();
      staffFormOpen=false; staffEditId=null; render();
      return;
    }

    const role=document.getElementById('sfRole').value;
    if(!password){ alert('Please enter a password.'); return; }
    if(DB.users.some(u=>u.username===username)){ alert('That username is already taken.'); return; }
    const newUser = {id:uid('u'), username, password, role, name};
    if(role==='teacher'){
      newUser.designation = document.getElementById('sfDesignation').value;
      newUser.assignments = sfAssignments.map(a=>({...a}));
      newUser.officeAccess = document.getElementById('sfOfficeAccess').checked;
    }
    DB.users.push(newUser);
    await saveDB();
    staffFormOpen=false; render();
  };
}

function attachStudentsHandlers(){
  const cf = document.getElementById('stuClassFilter');
  if(cf) cf.onchange = ()=>{ studentFilter.className=cf.value; render(); };
  const sq = document.getElementById('stuSearch');
  if(sq) sq.oninput = ()=>{ studentFilter.q=sq.value; render(); };
  document.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>{ studentEditId=b.dataset.edit; render(); });
  document.querySelectorAll('[data-remove]').forEach(b=> b.onclick=async ()=>{
    const st = DB.students.find(x=>x.id===b.dataset.remove);
    if(!st) return;
    if(session.role==='principal'){
      if(!confirm('Remove this student from active records?')) return;
      st.status='left';
      await saveDB(); render();
    } else {
      if(!confirm(`Submit a request to remove ${st.name} from active records? This needs Principal approval before it takes effect.`)) return;
      DB.approvals.push({
        id:uid('ap'), kind:'student_delete', targetId:st.id, targetLabel:st.name,
        requestedBy:session.name, requestedByRole:session.role, requestedDate:todayISO(), status:'pending'
      });
      await saveDB();
      alert('Removal request submitted for Principal approval.');
      render();
    }
  });
  const cancel = document.getElementById('seCancel');
  if(cancel) cancel.onclick = ()=>{ studentEditId=null; render(); };
  const save = document.getElementById('seSave');
  if(save) save.onclick = async ()=>{
    const s = DB.students.find(x=>x.id===studentEditId);
    const name = document.getElementById('seName').value.trim();
    const contact = document.getElementById('seContact').value.trim();
    const feEl = document.getElementById('seFather');
    const moEl = document.getElementById('seMother');
    const dobEl = document.getElementById('seDob');
    const admEl = document.getElementById('seAdmNo');
    const fatherName = feEl ? feEl.value.trim() : s.fatherName;
    const motherName = moEl ? moEl.value.trim() : s.motherName;
    const dob = (dobEl && dobEl.value) ? dobEl.value : s.dob;
    const admissionNo = (admEl && admEl.value.trim()) ? admEl.value.trim() : s.admissionNo;
    const className = document.getElementById('seClass').value;
    const section = document.getElementById('seSection').value;
    const address = document.getElementById('seAddress').value.trim();
    const username = document.getElementById('seUser').value.trim() || s.username;
    const password = document.getElementById('sePass').value || s.password;

    if(admissionNo !== s.admissionNo && DB.students.some(x=>x.id!==s.id && x.admissionNo===admissionNo)){
      alert('That admission number is already used by another student.'); return;
    }
    if(username !== s.username && DB.students.some(x=>x.id!==s.id && x.username===username)){
      alert('That username is already taken by another student.'); return;
    }

    const changes = {name, contact, fatherName, motherName, dob, admissionNo, className, section, address, username, password};

    if(session.role==='principal'){
      Object.assign(s, changes);
      await saveDB();
      studentEditId=null; render();
    } else {
      DB.approvals.push({
        id:uid('ap'), kind:'student_edit', targetId:s.id, targetLabel:s.name, changes,
        requestedBy:session.name, requestedByRole:session.role, requestedDate:todayISO(), status:'pending'
      });
      await saveDB();
      studentEditId=null; render();
      alert('Changes submitted for Principal approval.');
    }
  };
}

let attState = {className:'', section:'', date: todayISO(), draft:{}};
function attendanceView(){
  if(session.role==='student'){
    const student = DB.students.find(s=>s.id===session.id) || session;
    const prefix = `${student.className}-${student.section}-`;
    const rows = Object.keys(DB.attendance)
      .filter(k=>k.startsWith(prefix) && DB.attendance[k][student.id])
      .map(k=>({date:k.slice(prefix.length), status:DB.attendance[k][student.id]}))
      .sort((a,b)=> b.date.localeCompare(a.date));
    const presentCount = rows.filter(r=>r.status==='P').length;
    return `
    <div class="panel">
      <h2>My attendance ${rows.length ? `<span class="tag">${presentCount}/${rows.length} present</span>` : ''}</h2>
      ${rows.length===0 ? `<div class="empty"><b>No attendance recorded yet</b>Your class teacher marks attendance day by day.</div>` : `
      <table>
        <thead><tr><th class="idx">#</th><th>Date</th><th>Status</th></tr></thead>
        <tbody>
          ${rows.map((r,i)=>`
            <tr>
              <td class="idx">${i+1}</td>
              <td>${fmtDate(r.date)}</td>
              <td><span class="pill ${r.status==='P'?'pill-present':'pill-absent'}">${r.status==='P'?'Present':'Absent'}</span></td>
            </tr>`).join('')}
        </tbody>
      </table>`}
    </div>`;
  }
  const teacherClasses = session.role==='teacher' ? teacherClassOptions(session) : [];
  if(session.role==='teacher'){
    if(!attState.className || !teacherClasses.some(c=>c.className===attState.className && c.section===attState.section)){
      attState.className = teacherClasses[0] ? teacherClasses[0].className : CLASSES[0];
      attState.section = teacherClasses[0] ? teacherClasses[0].section : SECTIONS[0];
    }
  } else if(!attState.className){
    attState.className = CLASSES[0]; attState.section = SECTIONS[0];
  }
  const key = `${attState.className}-${attState.section}-${attState.date}`;
  const saved = DB.attendance[key] || {};
  const roster = studentsOf(attState.className, attState.section);
  const isTeacher = session.role==='teacher';

  return `
  <div class="panel">
    <h2>Attendance register</h2>
    <div class="row-inline">
      ${isTeacher ? `<div class="field"><label>Class</label>
        <select id="attClassSec">${teacherClasses.map(c=>`<option value="${c.className}|${c.section}" ${c.className===attState.className && c.section===attState.section?'selected':''}>Class ${c.className}-${c.section}</option>`).join('')}</select>
      </div>` : `
      <div class="field"><label>Class</label><select id="attClass">${CLASSES.map(c=>`<option value="${c}" ${c===attState.className?'selected':''}>Class ${c}</option>`).join('')}</select></div>
      <div class="field"><label>Section</label><select id="attSection">${SECTIONS.map(x=>`<option ${x===attState.section?'selected':''}>${x}</option>`).join('')}</select></div>
      `}
      <div class="field"><label>Date</label><input type="date" id="attDate" value="${attState.date}" max="${todayISO()}"></div>
    </div>
    ${roster.length===0 ? `<div class="empty"><b>No students in this class-section</b>Add students via Admissions first.</div>` : `
    <table>
      <thead><tr><th class="idx">#</th><th>Admission No.</th><th>Name</th><th>Status</th></tr></thead>
      <tbody>
        ${roster.map((s,i)=>{
          const cur = (key in attState.draft) ? attState.draft[key][s.id] : saved[s.id];
          const status = cur || 'P';
          return `<tr>
            <td class="idx">${i+1}</td>
            <td>${esc(s.admissionNo)}</td>
            <td>${esc(s.name)}</td>
            <td>
              <div class="toggle-att" data-sid="${s.id}">
                <button class="att-p ${status==='P'?'p-on':''}" data-val="P">Present</button>
                <button class="att-a ${status==='A'?'a-on':''}" data-val="A">Absent</button>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div style="margin-top:16px;display:flex;align-items:center;gap:14px;">
      <button class="btn btn-primary" id="attSave">Save attendance</button>
      <span class="note" id="attSavedNote">${key in DB.attendance ? 'Previously saved for this date.' : ''}</span>
    </div>`}
  </div>`;
}
function attachAttendanceHandlers(){
  if(session.role==='student') return;
  const cSel = document.getElementById('attClass');
  if(cSel) cSel.onchange = ()=>{ attState.className=cSel.value; render(); };
  const sSel = document.getElementById('attSection');
  if(sSel) sSel.onchange = ()=>{ attState.section=sSel.value; render(); };
  const csSel = document.getElementById('attClassSec');
  if(csSel) csSel.onchange = ()=>{ const [c,s]=csSel.value.split('|'); attState.className=c; attState.section=s; render(); };
  const dSel = document.getElementById('attDate');
  if(dSel) dSel.onchange = ()=>{ attState.date=dSel.value; render(); };
  const key = `${attState.className}-${attState.section}-${attState.date}`;
  if(!attState.draft[key]) attState.draft[key] = {...(DB.attendance[key]||{})};
  document.querySelectorAll('.toggle-att').forEach(tg=>{
    tg.querySelectorAll('button').forEach(btn=>{
      btn.onclick = ()=>{
        attState.draft[key][tg.dataset.sid] = btn.dataset.val;
        render();
      };
    });
  });
  const save = document.getElementById('attSave');
  if(save) save.onclick = async ()=>{
    const roster = studentsOf(attState.className, attState.section);
    const record = {};
    roster.forEach(s=> record[s.id] = attState.draft[key][s.id] || 'P');
    DB.attendance[key] = record;
    await saveDB();
    document.getElementById('attSavedNote').textContent = 'Attendance saved for ' + fmtDate(attState.date) + '.';
  };
}

let marksState = {className:'', section:'', exam:EXAMS[0], subject:SUBJECTS[0], draft:{}};
function marksView(){
  if(session.role==='student'){
    const student = DB.students.find(s=>s.id===session.id) || session;
    const prefix = `${student.className}-${student.section}-`;
    const rows = [];
    Object.keys(DB.marks).forEach(k=>{
      if(!k.startsWith(prefix)) return;
      const val = DB.marks[k][student.id];
      if(val===undefined || val==='') return;
      const [exam, subject] = k.slice(prefix.length).split('-');
      rows.push({exam, subject, val});
    });
    return `
    <div class="panel">
      <h2>My marks</h2>
      ${rows.length===0 ? `<div class="empty"><b>No marks recorded yet</b>Your subject teacher enters marks after each examination.</div>` : `
      <table>
        <thead><tr><th class="idx">#</th><th>Examination</th><th>Subject</th><th>Marks (/100)</th></tr></thead>
        <tbody>
          ${rows.map((r,i)=>`
            <tr>
              <td class="idx">${i+1}</td>
              <td>${esc(r.exam)}</td>
              <td>${esc(r.subject)}</td>
              <td>${esc(r.val)}</td>
            </tr>`).join('')}
        </tbody>
      </table>`}
    </div>`;
  }
  const teacherClasses = session.role==='teacher' ? teacherClassOptions(session) : [];
  if(session.role==='teacher'){
    if(!marksState.className || !teacherClasses.some(c=>c.className===marksState.className && c.section===marksState.section)){
      marksState.className = teacherClasses[0] ? teacherClasses[0].className : CLASSES[0];
      marksState.section = teacherClasses[0] ? teacherClasses[0].section : SECTIONS[0];
    }
    const mySubjects = teacherSubjectsFor(session, marksState.className, marksState.section);
    if(!marksState.subject || !mySubjects.includes(marksState.subject)) marksState.subject = mySubjects[0] || SUBJECTS[0];
  } else if(!marksState.className){
    marksState.className = CLASSES[0]; marksState.section = SECTIONS[0];
  }
  const isTeacher = session.role==='teacher';
  const key = `${marksState.className}-${marksState.section}-${marksState.exam}-${marksState.subject}`;
  const saved = DB.marks[key] || {};

  const subjectOptions = isTeacher ? teacherSubjectsFor(session, marksState.className, marksState.section) : SUBJECTS;

  return `
  <div class="panel">
    <h2>Examination marks</h2>
    <div class="row-inline">
      ${isTeacher ? `<div class="field"><label>Class</label>
        <select id="mClassSec">${teacherClasses.map(c=>`<option value="${c.className}|${c.section}" ${c.className===marksState.className && c.section===marksState.section?'selected':''}>Class ${c.className}-${c.section}</option>`).join('')}</select>
      </div>` : `
      <div class="field"><label>Class</label><select id="mClass">${CLASSES.map(c=>`<option value="${c}" ${c===marksState.className?'selected':''}>Class ${c}</option>`).join('')}</select></div>
      <div class="field"><label>Section</label><select id="mSection">${SECTIONS.map(x=>`<option ${x===marksState.section?'selected':''}>${x}</option>`).join('')}</select></div>
      `}
      <div class="field"><label>Examination</label><select id="mExam">${EXAMS.map(x=>`<option ${x===marksState.exam?'selected':''}>${x}</option>`).join('')}</select></div>
      <div class="field"><label>Subject</label><select id="mSubject">${subjectOptions.map(x=>`<option ${x===marksState.subject?'selected':''}>${x}</option>`).join('')}</select></div>
    </div>
    ${roster.length===0 ? `<div class="empty"><b>No students in this class-section</b></div>` : `
    <table>
      <thead><tr><th class="idx">#</th><th>Admission No.</th><th>Name</th><th style="width:140px;">Marks (/100)</th></tr></thead>
      <tbody>
        ${roster.map((s,i)=>{
          const val = (key in marksState.draft) ? (marksState.draft[key][s.id] ?? '') : (saved[s.id] ?? '');
          return `<tr>
            <td class="idx">${i+1}</td>
            <td>${esc(s.admissionNo)}</td>
            <td>${esc(s.name)}</td>
            <td><input type="number" min="0" max="100" class="markInput" data-sid="${s.id}" value="${val}" style="width:90px;padding:6px 8px;border:1px solid var(--line);border-radius:4px;"></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div style="margin-top:16px;display:flex;align-items:center;gap:14px;">
      <button class="btn btn-primary" id="mSave">Save marks</button>
      <span class="note" id="mSavedNote">${key in DB.marks ? 'Previously saved for this exam.' : ''}</span>
    </div>`}
  </div>`;
}
function attachMarksHandlers(){
  if(session.role==='student') return;
  const cSel = document.getElementById('mClass');
  if(cSel) cSel.onchange = ()=>{ marksState.className=cSel.value; render(); };
  const sSel = document.getElementById('mSection');
  if(sSel) sSel.onchange = ()=>{ marksState.section=sSel.value; render(); };
  const csSel = document.getElementById('mClassSec');
  if(csSel) csSel.onchange = ()=>{ const [c,s]=csSel.value.split('|'); marksState.className=c; marksState.section=s; marksState.subject=''; render(); };
  const eSel = document.getElementById('mExam');
  if(eSel) eSel.onchange = ()=>{ marksState.exam=eSel.value; render(); };
  const subSel = document.getElementById('mSubject');
  if(subSel) subSel.onchange = ()=>{ marksState.subject=subSel.value; render(); };

  const key = `${marksState.className}-${marksState.section}-${marksState.exam}-${marksState.subject}`;
  if(!marksState.draft[key]) marksState.draft[key] = {...(DB.marks[key]||{})};
  document.querySelectorAll('.markInput').forEach(inp=>{
    inp.oninput = ()=>{ marksState.draft[key][inp.dataset.sid] = inp.value; };
  });
  const save = document.getElementById('mSave');
  if(save) save.onclick = async ()=>{
    const roster = studentsOf(marksState.className, marksState.section);
    const record = {};
    roster.forEach(s=>{
      const inp = document.querySelector(`.markInput[data-sid="${s.id}"]`);
      record[s.id] = inp ? inp.value : '';
    });
    DB.marks[key] = record;
    await saveDB();
    document.getElementById('mSavedNote').textContent = 'Marks saved for ' + marksState.exam + '.';
  };
}

function attachAdmissionsHandlers(){
  const addBtn = document.getElementById('addAdmBtn');
  if(addBtn) addBtn.onclick = ()=>{ admFormOpen=true; render(); };
  document.querySelectorAll('[data-adm-del]').forEach(b=>{
    b.onclick = async ()=>{
      const adm = DB.admissions.find(a=>a.id===b.dataset.admDel);
      if(!adm) return;
      if(session.role==='principal'){
        if(!confirm(`Permanently delete this admission entry for ${adm.name}? This also removes their student record entirely (attendance, marks, certificates linked to them may become orphaned). This cannot be undone.`)) return;
        DB.admissions = DB.admissions.filter(a=>a.id!==adm.id);
        if(adm.studentId) DB.students = DB.students.filter(s=>s.id!==adm.studentId);
        await saveDB(); render();
      } else {
        if(!confirm(`Submit a request to permanently delete this admission entry for ${adm.name}? This needs Principal approval.`)) return;
        DB.approvals.push({
          id:uid('ap'), kind:'admission_delete', targetId:adm.id, targetLabel:adm.name,
          requestedBy:session.name, requestedByRole:session.role, requestedDate:todayISO(), status:'pending'
        });
        await saveDB();
        alert('Deletion request submitted for Principal approval.');
        render();
      }
    };
  });
  const cancel = document.getElementById('afCancel');
  if(cancel) cancel.onclick = ()=>{ admFormOpen=false; render(); };
  const save = document.getElementById('afSave');
  if(save) save.onclick = async ()=>{
    const admissionNo = document.getElementById('afAdmNo').value.trim();
    const admissionDate = document.getElementById('afAdmDate').value || todayISO();
    const name = document.getElementById('afName').value.trim();
    const fatherName = document.getElementById('afFather').value.trim();
    const motherName = document.getElementById('afMother').value.trim();
    const dob = document.getElementById('afDob').value;
    const contact = document.getElementById('afContact').value.trim();
    const className = document.getElementById('afClass').value;
    const section = document.getElementById('afSection').value;
    const address = document.getElementById('afAddress').value.trim();
    if(!name || !fatherName){ alert('Please enter at least the student and father\'s name.'); return; }
    if(!admissionNo){ alert('Please enter an admission number.'); return; }
    if(DB.students.some(s=>s.admissionNo===admissionNo)){ alert('That admission number is already in use.'); return; }
    const seq = (DB.students.length+1).toString().padStart(4,'0');
    const sId = uid('s');
    let username = document.getElementById('afUser').value.trim();
    let password = document.getElementById('afPass').value;
    if(!username) username = name.toLowerCase().replace(/[^a-z]+/g,'.').replace(/^\.|\.$/g,'') || uid('stu');
    if(DB.students.some(s=>s.username===username)) username = `${username}.${seq}`;
    if(!password) password = 'student' + seq;
    DB.students.push({
      id:sId, admissionNo, name, fatherName, motherName, dob, className, section,
      address, contact, admissionDate, status:'active', username, password
    });
    DB.admissions.push({id:uid('a'), name, fatherName, className, section, date: admissionDate, status:'Admitted', studentId:sId});
    await saveDB();
    admFormOpen=false; render();
    alert(`Student admitted. Login for ${name}:\nUsername: ${username}\nPassword: ${password}`);
  };
}

function certBodyText(rec, student){
  const clsLine = `Class ${student.className}-${student.section}`;
  if(rec.type==='Bonafide Certificate'){
    return `This is to certify that <b>${esc(student.name)}</b>, daughter of Sh. ${esc(student.fatherName)},
    is a bona fide student of this institution, currently studying in ${clsLine} for the academic session ${new Date().getFullYear()}.
    Her admission number is <b>${esc(student.admissionNo)}</b> and her date of birth, as recorded in the school register, is ${fmtDate(student.dob)}.
    ${rec.reason ? `This certificate is issued ${esc(rec.reason)}.` : 'This certificate is issued on request for whatever purpose it may serve.'}`;
  }
  if(rec.type==='Transfer Certificate'){
    return `This is to certify that <b>${esc(student.name)}</b>, daughter of Sh. ${esc(student.fatherName)},
    admission number <b>${esc(student.admissionNo)}</b>, was a student of this school and was studying in ${clsLine}
    at the time of leaving. Her date of birth as per the school register is ${fmtDate(student.dob)}, and her conduct
    during her time at this institution was satisfactory. She is hereby relieved from the rolls of this school
    with effect from ${fmtDate(todayISO())}. ${rec.reason ? `Reason for leaving: ${esc(rec.reason)}.` : ''}`;
  }
  if(rec.type==='Character Certificate'){
    return `This is to certify that <b>${esc(student.name)}</b>, daughter of Sh. ${esc(student.fatherName)},
    a student of ${clsLine}, admission number <b>${esc(student.admissionNo)}</b>, bears a good moral character.
    During her association with this institution, her conduct and behaviour have been found satisfactory.
    ${rec.reason ? `This certificate is issued ${esc(rec.reason)}.` : 'This certificate is issued on request.'}`;
  }
  return `This is to certify that <b>${esc(student.name)}</b>, daughter of Sh. ${esc(student.fatherName)},
  admission number <b>${esc(student.admissionNo)}</b>, is provisionally certified as a student of ${clsLine} of this
  institution for the academic session ${new Date().getFullYear()}, pending completion of final records.
  ${rec.reason ? `Issued ${esc(rec.reason)}.` : ''}`;
}

  overlay.innerHTML = `
    <div class="cert-toolbar no-print">

    ${list.length===0 ? `<div class="empty"><b>No circulars posted yet</b>Notices and orders from the Principal will appear here.</div>` : list.map(c=>`
      <div class="panel" style="margin-bottom:12px;background:var(--cream);">
        <h3 style="margin:0 0 6px;">${esc(c.title)}</h3>
        <div class="note" style="margin-bottom:8px;">Posted by ${esc(c.postedBy)} on ${fmtDate(c.postedDate)}</div>

  ${circFormOpen ? circularFormModal() : ''}`;
}

  const cancel = document.getElementById('circCancel');

    b.onclick = async ()=>{

/* ======================= ACCOUNTS ======================= */

    <div class="stat-card"><div class="num">₹${totalExpense.toLocaleString('en-IN')}</div><div class="lbl">Total expense</div></div>
    <div class="stat-card"><div class="num">₹${balance.toLocaleString('en-IN')}</div><div class="lbl">Balance</div></div>
  </div>
  <div class="panel">
    <h2>Accounts register <button class="btn btn-primary" id="addAcBtn">+ Add entry</button></h2>
    ${entries.length===0 ? `<div class="empty"><b>No entries yet</b>Record fees received, salaries paid, or other school expenses here.</div>` : `
    <table>
      <thead><tr><th class="idx">#</th><th>Date</th><th>Description</th><th>Type</th><th>Amount</th><th>Recorded by</th><th></th></tr></thead>

          <tr>

function accountFormModal(){

/* ======================= APPROVALS ======================= */
const APPROVAL_FIELD_LABELS = {
  name:"Name", contact:"Contact", fatherName:"Father's name", motherName:"Mother's name",
  dob:"Date of birth", admissionNo:"Admission No.", className:"Class", section:"Section",
  address:"Address", username:"Username", password:"Password",
  designation:"Designation", assignments:"Classes taught"
};
function approvalKindLabel(kind){
  if(kind==='student_edit') return 'Student edit';
  if(kind==='student_delete') return 'Student removal';
  if(kind==='admission_delete') return 'Admission entry deletion';
  if(kind==='staff_edit') return 'Staff edit';
  if(kind==='staff_reset_password') return 'Staff password reset';
  return kind;
}
function approvalSummary(a){
  if(a.kind==='student_delete' || a.kind==='staff_delete') return `Remove ${esc(a.targetLabel)} from active records.`;
  if(a.kind==='admission_delete') return `Permanently delete the admission entry and student record for ${esc(a.targetLabel)}. This cannot be undone once approved.`;
  if(a.kind==='staff_reset_password') return `Reset this staff member's login password.`;
  const rows = Object.keys(a.changes||{}).map(k=>{
    let val = a.changes[k];
    if(k==='assignments' && Array.isArray(val)){
      val = val.map(x=>`Class ${x.className}-${x.section} · ${x.subject}`).join(', ') || '(none)';
    }
    return `<div style="margin-bottom:4px;"><b>${APPROVAL_FIELD_LABELS[k]||k}:</b> ${esc(String(val))}</div>`;
  }).join('');
  return rows || '<i>No field changes recorded.</i>';
}
function approvalsView(){
  const pending = DB.approvals.filter(a=>a.status==='pending').slice().reverse();
  const reviewed = DB.approvals.filter(a=>a.status!=='pending').slice().reverse().slice(0,20);
  return `
  <div class="panel">
    <h2>Pending approvals</h2>
    ${pending.length===0 ? `<div class="empty"><b>Nothing waiting for review</b>Edits and deletions submitted by Office staff and Accounts will appear here.</div>` : pending.map(a=>`
      <div class="panel" style="margin-bottom:12px;background:var(--cream);">
        <h3 style="margin:0 0 6px;">${approvalKindLabel(a.kind)} — ${esc(a.targetLabel)}</h3>
        <div class="note" style="margin-bottom:10px;">Requested by ${esc(a.requestedBy)} (${esc(a.requestedByRole)}) on ${fmtDate(a.requestedDate)}</div>
        <div style="font-size:13.5px;margin-bottom:12px;">${approvalSummary(a)}</div>
        <button class="btn btn-primary" data-approve="${a.id}">Approve</button>
        <button class="btn btn-outline" data-reject="${a.id}">Reject</button>
      </div>`).join('')}
  </div>
  ${reviewed.length ? `
  <div class="panel">
    <h2>Recently reviewed</h2>
    <table>
      <thead><tr><th class="idx">#</th><th>Type</th><th>Target</th><th>Requested by</th><th>Status</th></tr></thead>
      <tbody>
        ${reviewed.map((a,i)=>`
          <tr>
            <td class="idx">${i+1}</td>
            <td>${approvalKindLabel(a.kind)}</td>
            <td>${esc(a.targetLabel)}</td>
            <td>${esc(a.requestedBy)}</td>
            <td><span class="pill ${a.status==='approved'?'pill-present':'pill-absent'}">${a.status==='approved'?'Approved':'Rejected'}</span></td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>` : ''}`;
}
function applyApproval(a){
  if(a.kind==='student_edit'){
    const s = DB.students.find(x=>x.id===a.targetId);
    if(s) Object.assign(s, a.changes);
  } else if(a.kind==='student_delete'){
    const s = DB.students.find(x=>x.id===a.targetId);
    if(s) s.status = 'left';
  } else if(a.kind==='admission_delete'){
    const adm = DB.admissions.find(x=>x.id===a.targetId);
    if(adm){
      DB.admissions = DB.admissions.filter(x=>x.id!==adm.id);
      if(adm.studentId) DB.students = DB.students.filter(s=>s.id!==adm.studentId);
    }
  } else if(a.kind==='staff_edit'){
    const u = DB.users.find(x=>x.id===a.targetId);
    if(u) Object.assign(u, a.changes);
  } else if(a.kind==='staff_reset_password'){
    const u = DB.users.find(x=>x.id===a.targetId);
    if(u) u.password = a.changes.password;
  }
}
function attachApprovalsHandlers(){
  document.querySelectorAll('[data-approve]').forEach(b=>{
    b.onclick = async ()=>{
      const a = DB.approvals.find(x=>x.id===b.dataset.approve);
      if(!a) return;
      if(!confirm('Approve this request? It will be applied immediately.')) return;
      applyApproval(a);
      a.status = 'approved';
      a.reviewedDate = todayISO();
      await saveDB(); render();
    };
  });
  document.querySelectorAll('[data-reject]').forEach(b=>{
    b.onclick = async ()=>{
      const a = DB.approvals.find(x=>x.id===b.dataset.reject);
      if(!a) return;
      if(!confirm('Reject this request? No changes will be made.')) return;
      a.status = 'rejected';
      a.reviewedDate = todayISO();
      await saveDB(); render();
    };
  });
}

/* ======================= BACKUP & RESTORE ======================= */
function backupView(){
  const studentCount = DB.students.filter(s=>s.status!=='left').length;
  const staffCount = DB.users.filter(u=>u.role!=='principal').length;
  return `
  <div class="panel">
    <h2>Download a backup</h2>
    <p style="font-size:13.5px;line-height:1.8;color:var(--ink-soft);">
      This app stores all its data only in this browser on this device — there is no separate server copy.
      If the browser's data is ever cleared, or you switch devices, everything (students, staff, marks, certificates)
      can be lost unless you have a backup file. <b>Download a backup regularly</b> — after admitting new students,
      adding staff, or entering marks — and save the file somewhere safe (email it to yourself, or save it to Google Drive).
    </p>
    <p style="font-size:13.5px;margin-bottom:14px;"><b>Current data:</b> ${studentCount} active students, ${staffCount} staff accounts.</p>
    <button class="btn btn-primary" id="downloadBackupBtn">Download backup file</button>
  </div>
  <div class="panel">
    <h2>Restore from a backup</h2>
    <p style="font-size:13.5px;line-height:1.8;color:var(--ink-soft);">
      Use this if this device's data was lost or reset, and you have a backup file downloaded earlier.
      <b style="color:var(--saffron-dark);">Warning: this replaces everything currently in the app with the contents of the backup file.</b>
    </p>
    <input type="file" id="restoreFile" accept=".json" style="margin-bottom:12px;display:block;">
    <button class="btn btn-outline" id="restoreBackupBtn">Restore from this file</button>
  </div>`;
}
function attachBackupHandlers(){
  const dlBtn = document.getElementById('downloadBackupBtn');
  if(dlBtn) dlBtn.onclick = ()=>{
    try{
      const payload = {
        appName: "GGHSS Singhpora Kalan — School Management System",
        backupVersion: 1,
        exportedDate: new Date().toISOString(),
        data: DB
      };
      const json = JSON.stringify(payload, null, 2);
      const blob = new Blob([json], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `gghss-sms-backup-${todayISO()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }catch(e){
      alert('Could not create the backup file: ' + e.message);
    }
  };
  const restoreBtn = document.getElementById('restoreBackupBtn');
  if(restoreBtn) restoreBtn.onclick = ()=>{
    const fileInput = document.getElementById('restoreFile');
    const file = fileInput.files[0];
    if(!file){ alert('Please choose a backup file first.'); return; }
    const reader = new FileReader();
    reader.onload = async ()=>{
      try{
        const parsed = JSON.parse(reader.result);
        const incoming = parsed.data || parsed; // support raw DB exports too
        if(!incoming.students || !incoming.users){
          alert('This does not look like a valid backup file.'); return;
        }
        if(!confirm('This will REPLACE all current data in the app with the contents of this backup file. This cannot be undone. Continue?')) return;
        DB = incoming;
        if(!DB.reportCards) DB.reportCards = [];
        if(!DB.assignments) DB.assignments = [];
        if(!DB.circulars) DB.circulars = [];
        if(!DB.accountEntries) DB.accountEntries = [];
        if(!DB.approvals) DB.approvals = [];
        await saveDB();
        alert('Backup restored successfully.');
        render();
      }catch(e){
        alert('Could not read that file. Make sure it is a backup file downloaded from this app.');
      }
    };
    reader.readAsText(file);
  };
}

/* ======================= INIT ======================= */
(async function init(){
  await loadDB();
  restoreSession();
  if(session){
    // re-link the session to the freshest copy of the underlying record, in case it changed
    const fresh = session.role==='student'
      ? DB.students.find(s=>s.id===session.id)
      : DB.users.find(u=>u.id===session.id);
    if(fresh){ session = {...fresh, role: session.role}; }
    else { session = null; } // account was removed since last login
    saveSession();
  }
  render();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(e=> console.warn('Service worker registration failed (this is expected if the file is opened directly rather than served over http/https):', e));
  });
}
